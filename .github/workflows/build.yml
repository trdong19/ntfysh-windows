name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        runtime: [win-x64, win-x86]

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 6
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Restore dependencies
      run: dotnet restore -r ${{ matrix.runtime }}

    - name: Build
      run: dotnet publish ntfysh_client/ntfysh_client.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/${{ matrix.runtime }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ntfysh-windows-${{ matrix.runtime }}
        path: ./publish/${{ matrix.runtime }}/

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Download win-x64 artifact
      uses: actions/download-artifact@v4
      with:
        name: ntfysh-windows-win-x64
        path: ./release/win-x64

    - name: Download win-x86 artifact
      uses: actions/download-artifact@v4
      with:
        name: ntfysh-windows-win-x86
        path: ./release/win-x86

    - name: Create zip archives
      shell: pwsh
      run: |
        Compress-Archive -Path ./release/win-x64/* -DestinationPath ./ntfysh-windows-win-x64.zip
        Compress-Archive -Path ./release/win-x86/* -DestinationPath ./ntfysh-windows-win-x86.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./ntfysh-windows-win-x64.zip
          ./ntfysh-windows-win-x86.zip
        generate_release_notes: true
